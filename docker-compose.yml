version: '3.8'

services:
  db:
    image: postgres:15-alpine
    network_mode: "host"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lms
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    network_mode: "host"
    environment:
      DATABASE_URL: postgresql://user:password@localhost:5432/lms
    depends_on:
      - db

  nanobot:
    build: ./nanobot
    network_mode: "host"
    environment:
      LLM_API_KEY: my-secret-qwen-key
      LLM_API_BASE: http://localhost:42005/v1
      LLM_MODEL: coder-model
      BACKEND_URL: http://localhost:8000
    depends_on:
      - backend

  frontend:
    image: nginx:alpine
    network_mode: "host"
    volumes:
      - ./frontend:/usr/share/nginx/html
