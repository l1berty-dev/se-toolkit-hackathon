<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPlanner Pro | Academic Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 240px; background: #fff; border-right: 1px solid #e2e8f0; padding: 24px; }
        .main-content { flex: 1; overflow-y: auto; padding: 40px; }
        .chat-panel { width: 380px; background: #fff; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #f1f5f9; padding: 20px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #fdfdfd; }
        .message { padding: 12px 16px; border-radius: 14px; max-width: 90%; font-size: 0.9em; }
        .message.user { background: var(--primary); color: #fff; align-self: flex-end; }
        .message.agent { background: #f1f5f9; align-self: flex-start; border: 1px solid #e2e8f0; }
        .time-left { font-weight: 700; color: var(--primary); }
        .urgent { color: #ef4444 !important; }
        .nav-btn { color: #64748b; font-weight: 500; border-radius: 8px; margin-bottom: 5px; text-align: left; width: 100%; border: none; background: none; padding: 10px 15px; }
        .nav-btn.active { background: #f1f5f9; color: var(--primary); }
        .pointer { cursor: pointer; }
        .tab-content-area { display: none; }
        .tab-content-area.active { display: block; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-primary fw-bold mb-5">EduPlanner</h4>
        <nav class="flex-column">
            <button id="btn-dash" class="nav-btn active" onclick="switchTab('dash')"><i class="fas fa-home me-2"></i> Dashboard</button>
            <button id="btn-courses" class="nav-btn" onclick="switchTab('courses')"><i class="fas fa-list me-2"></i> My Courses</button>
        </nav>
    </div>

    <div class="main-content">
        <!-- Dashboard -->
        <div id="tab-dash" class="tab-content-area active">
            <h2 class="fw-bold mb-4">Academic Overview</h2>
            <div class="row">
                <div class="col-md-5">
                    <h5 class="mb-3 text-muted">Upcoming Deadlines</h5>
                    <div id="deadlineContainer">Loading...</div>
                </div>
                <div class="col-md-7">
                    <h5 class="mb-3 text-muted">Performance Trend</h5>
                    <div class="card">
                        <canvas id="gradeChart"></canvas>
                    </div>
                    
                    <h5 class="mb-3 mt-4 text-muted">Assignment Status</h5>
                    <div class="card mx-auto" style="max-width: 400px;">
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Courses -->
        <div id="tab-courses" class="tab-content-area">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold mb-0">Course Management</h2>
                <button class="btn btn-primary" onclick="addCourse()"><i class="fas fa-plus me-2"></i>Add Course</button>
            </div>
            <div id="coursesContainer">Loading courses...</div>
        </div>
    </div>

    <div class="chat-panel">
        <div class="p-3 border-bottom text-center fw-bold bg-light">AI Advisor</div>
        <div class="chat-messages" id="chatMessages">
            <div class="message agent">Hello John! I'm your AI Academic Advisor. I've analyzed your performance. How can I help you today?</div>
        </div>
        <div class="p-3 border-top">
            <div class="input-group">
                <input type="text" id="userInput" class="form-control" placeholder="Ask me..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button class="btn btn-primary" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        const API = `http://${window.location.hostname}:8000`;
        let myChart;
        let statusChart;

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content-area').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.getElementById(`btn-${tabId}`).classList.add('active');

            if (tabId === 'dash') {
                loadDeadlines();
                refreshPerformance();
            }
            if (tabId === 'courses') loadCourses();
        }

        function updateCharts(courses) {
            const ctxTrend = document.getElementById('gradeChart').getContext('2d');
            let dataPoints = [];
            courses.forEach(c => {
                c.assignments.forEach(a => {
                    if (a.score !== null) {
                        dataPoints.push({ x: new Date(a.deadline), y: parseFloat(a.score), title: a.title });
                    }
                });
            });
            dataPoints.sort((a, b) => a.x - b.x);

            if (myChart) myChart.destroy();
            myChart = new Chart(ctxTrend, {
                type: 'line',
                data: {
                    datasets: [{
                        label: 'Scores (%)',
                        data: dataPoints,
                        borderColor: '#4f46e5',
                        tension: 0.3,
                        fill: true,
                        backgroundColor: 'rgba(79, 70, 229, 0.1)'
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { type: 'time', time: { unit: 'day' } },
                        y: { beginAtZero: true, max: 100 }
                    }
                }
            });

            // Status Distribution Chart Logic
            const now = new Date();
            let graded = { count: 0, items: [] };
            let upcoming = { count: 0, items: [] };
            let overdue = { count: 0, items: [] };

            courses.forEach(c => {
                c.assignments.forEach(a => {
                    if (a.score !== null) {
                        graded.count++;
                        graded.items.push(`${a.title} (${c.course_info.name})`);
                    } else if (new Date(a.deadline) < now) {
                        overdue.count++;
                        overdue.items.push(`${a.title} (${c.course_info.name})`);
                    } else {
                        upcoming.count++;
                        upcoming.items.push(`${a.title} (${c.course_info.name})`);
                    }
                });
            });

            const ctxStatus = document.getElementById('statusChart').getContext('2d');
            if (statusChart) statusChart.destroy();
            statusChart = new Chart(ctxStatus, {
                type: 'doughnut',
                data: {
                    labels: ['Graded', 'Upcoming', 'Overdue'],
                    datasets: [{
                        data: [graded.count, upcoming.count, overdue.count],
                        backgroundColor: ['#10b981', '#4f46e5', '#ef4444'],
                        borderWidth: 0
                    }],
                    details: [graded.items, upcoming.items, overdue.items]
                },
                options: {
                    cutout: '70%',
                    maintainAspectRatio: true,
                    aspectRatio: 1.5,
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.label}: ${context.raw}`;
                                },
                                afterLabel: function(context) {
                                    const items = context.chart.data.details[context.dataIndex];
                                    if (!items || items.length === 0) return '';
                                    const result = items.slice(0, 5).map(str => " • " + str);
                                    if (items.length > 5) result.push("   ...and " + (items.length - 5) + " more");
                                    return result;
                                }
                            }
                        }
                    }
                }
            });
        }

        async function loadDeadlines() {
            try {
                const resp = await fetch(`${API}/deadlines`);
                const data = await resp.json();
                const now = new Date();
                const upcoming = data.filter(d => new Date(d.deadline) > now);
                
                document.getElementById('deadlineContainer').innerHTML = upcoming.map(d => {
                    const diff = new Date(d.deadline) - now;
                    const days = Math.floor(diff / (1000*60*60*24));
                    const hours = Math.floor((diff / (1000*60*60)) % 24);
                    const timeStr = days > 0 ? `${days}d ${hours}h left` : `${hours}h left`;
                    return `
                    <div class="card d-flex flex-row justify-content-between align-items-center">
                        <div><b>${d.title}</b><br><small class="text-muted">${d.course_name}</small></div>
                        <div class="text-end">
                            <div class="time-left ${days === 0 ? 'urgent' : ''}">${timeStr}</div>
                            <small class="text-muted">${new Date(d.deadline).toLocaleDateString()}</small>
                        </div>
                    </div>`;
                }).join('') || '<p>No upcoming deadlines.</p>';
            } catch (e) { console.error(e); }
        }

        async function refreshPerformance() {
            try {
                const resp = await fetch(`${API}/courses/performance`);
                const data = await resp.json();
                updateCharts(data);
            } catch (e) { console.error(e); }
        }

        async function loadCourses() {
            try {
                const resp = await fetch(`${API}/courses/performance`);
                const data = await resp.json();
                updateCharts(data);
                document.getElementById('coursesContainer').innerHTML = data.map(c => {
                    const currentScore = c.course_info.current_weighted_score !== null ? parseFloat(c.course_info.current_weighted_score).toFixed(1) : "0.0";
                    return `
                    <div class="card">
                        <div class="d-flex justify-content-between mb-3">
                            <h4 class="fw-bold mb-0">${c.course_info.name}</h4>
                            <div class="h4 text-primary mb-0">${currentScore}%</div>
                        </div>
                        <div class="d-flex gap-2 mb-3">
                            ${c.thresholds.map(t => `<span class="badge bg-light text-dark border">${t.grade_letter}: ${t.min_score}% <i class="fas fa-edit ms-1 pointer" onclick="editThreshold(${c.course_info.id},'${t.grade_letter}',${t.min_score})"></i></span>`).join('')}
                        </div>
                        <button class="btn btn-sm btn-outline-primary mb-3" onclick="addActivity(${c.course_info.id})">+ Add Activity</button>
                        <div class="list-group list-group-flush">
                            ${c.assignments.map(a => `
                                <div class="list-group-item d-flex justify-content-between align-items-center px-0">
                                    <div><b>${a.title}</b> (${Math.round(a.weight*100)}%)</div>
                                    <div>
                                        <span class="fw-bold me-3">${a.score !== null ? a.score + '%' : '--'}</span>
                                        <i class="fas fa-edit text-muted me-2 pointer" onclick="editActivity(${a.id},'${a.title}',${a.score})"></i>
                                        <i class="fas fa-trash text-danger pointer" onclick="deleteActivity(${a.id},'${a.title}')"></i>
                                    </div>
                                </div>`).join('')}
                        </div>
                    </div>`}).join('') || '<p class="text-center text-muted">No courses yet. Click "Add Course" to start.</p>';
            } catch (e) { console.error(e); }
        }

        async function addCourse() {
            const name = prompt("Course Name (e.g., Computer Science):");
            if (name) {
                const response = await fetch(`${API}/courses/add`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name, code: null })
                });
                if (response.ok) {
                    loadCourses();
                } else {
                    const err = await response.json();
                    alert("Error adding course: " + (err.detail || "Unknown error"));
                }
            }
        }

        async function editThreshold(course_id, grade_letter, min_score) {
            const scoreInput = prompt(`New minimum score for ${grade_letter}:`, min_score);
            if (scoreInput !== null) {
                const score = parseInt(scoreInput);
                if (isNaN(score) || score < 0 || score > 100) {
                    alert("Please enter a valid number (0-100).");
                    return;
                }
                const response = await fetch(`${API}/update/threshold`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({course_id, grade_letter, min_score: score}) 
                });
                
                if (response.ok) {
                    loadCourses();
                } else {
                    const err = await response.json();
                    alert("Error updating threshold: " + (err.detail || "Unknown error"));
                }
            }
        }

        async function addActivity(course_id) {
            const title = prompt("Title:");
            const weight = prompt("Weight (0.1 = 10%):");
            const dateInput = prompt("Date (YYYY-MM-DD):");
            if (title && weight && dateInput) {
                // Handle both date-only and potentially partial datetime inputs
                const deadline = dateInput.includes(':') ? dateInput : `${dateInput} 23:59:00`;
                const response = await fetch(`${API}/add/assignment`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({
                        course_id: parseInt(course_id), 
                        title: title, 
                        weight: parseFloat(weight), 
                        deadline: deadline
                    }) 
                });
                if (response.ok) {
                    loadCourses();
                    loadDeadlines();
                } else {
                    const errorData = await response.json();
                    alert("Error adding activity: " + (errorData.detail || "Check date format or weight."));
                }
            }
        }

        async function editActivity(id, title, score) {
            const currentScoreStr = (score !== null && score !== undefined) ? score.toString() : '';
            const nScore = prompt(`Score for ${title} (0-100, leave empty to remove):`, currentScoreStr);
            
            if (nScore !== null) {
                const parsedScore = nScore === '' ? null : parseFloat(nScore);
                if (parsedScore !== null && (isNaN(parsedScore) || parsedScore < 0 || parsedScore > 100)) {
                    alert("Please enter a valid score between 0 and 100.");
                    return;
                }
                
                const response = await fetch(`${API}/update/assignment`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({id, score: parsedScore}) 
                });
                
                if (response.ok) {
                    loadCourses();
                    loadDeadlines();
                } else {
                    const err = await response.json();
                    alert("Error updating score: " + (err.detail || "Unknown error"));
                }
            }
        }

        async function deleteActivity(id, title) {
            if (confirm(`Delete ${title}?`)) {
                await fetch(`${API}/delete/assignment`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id}) });
                loadCourses();
                loadDeadlines();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            input.value = '';
            try {
                const r = await fetch(`http://${window.location.hostname}:8080/chat`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: text}) });
                const d = await r.json();
                addMessage(d.response, 'agent');
            } catch (e) { addMessage("Error.", 'agent'); }
        }

        function addMessage(t, r) {
            const div = document.createElement('div');
            div.className = `message ${r}`;
            div.innerHTML = marked.parse(t);
            document.getElementById('chatMessages').appendChild(div);
            div.scrollIntoView();
        }

        window.onload = () => {
            loadDeadlines();
            refreshPerformance();
        };
    </script>
</body>
</html>
